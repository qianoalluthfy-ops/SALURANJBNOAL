<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QIANO STORE</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0a0a0a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      background: linear-gradient(90deg, red, purple, blue);
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #aaa;
    }

    .btn {
      margin-top: 20px;
      padding: 14px 28px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(90deg, red, blue);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px red;
    }

    .produk {
      padding: 50px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 20px purple;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .wa-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px 18px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 14px;
      box-shadow: 0 0 15px #25D366;
      transition: 0.3s;
    }

    .wa-float:hover {
      transform: scale(1.1);
    }

  </style>
</head>

<body>

<header>QIANO STORE</header>

<section class="hero">
  <h1>JUAL BELI AKUN GAME TERBAIK</h1>
  <p>Gabung channel kami untuk update & promo terbaru 🔥</p>

  <a href="https://whatsapp.com/channel/0029VbCIuvoKAwEv9xfzAw23" target="_blank">
    <button class="btn">Gabung Saluran WhatsApp</button>
  </a>
</section>

<section class="produk">
  <div class="card">
    <h3>AKUN GAME MURAH</h3>
    <p>AMAN TERPERCAYA</p>
  </div>
</section>

<footer>
  © 2026 QIANO STORE - All Rights Reserved
</footer>

<a href="https://whatsapp.com/channel/0029VbCIuvoKAwEv9xfzAw23" target="_blank" class="wa-float">
  Join WA
</a>

</body>
</html>
